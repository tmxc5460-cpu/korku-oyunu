<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate 3D Horror</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: fixed; top: 20px; left: 20px; color: red; font-family: 'Courier New'; z-index: 100; text-shadow: 2px 2px #000; pointer-events: none; }
        
        /* MOBİL KONTROLLER */
        #joy { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 1000; border: 1px solid rgba(255,0,0,0.5); }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: red; border-radius: 50%; opacity: 0.4; }
        
        .btns { position: fixed; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .btn { width: 70px; height: 70px; background: rgba(255,0,0,0.1); border: 2px solid red; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        #overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; color: white; z-index: 2000; cursor: pointer; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="overlay"><h1>KORKUYA BAŞLA</h1><p>Ses ve 3D için ekrana dokun!</p></div>
    <div id="ui">📍 KAT: 1 | CANAVAR MESAFESİ: <span id="dist">--</span></div>

    <div id="joy"><div id="stick"></div></div>
    <div class="btns">
        <div class="btn" onclick="jump()">ZIPLA</div>
        <div class="btn" onclick="toggleCrouch()" id="c-btn">EĞİL</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, moveX = 0, moveZ = 0;
        let flashlight, monster, ambientLight;
        let walls = [], isCrouching = false, jumpY = 0;
        let audioCtx, heartbeat, scream;

        // --- 1. 3D SAHNE KURULUMU ---
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.15); // Sis efekti

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 5); // Göz hizası

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Zemin
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Duvarlar (Labirent)
            createWall(5, 2, 0, 0, 5);
            createWall(5, 2, 10, 0, -5);
            createWall(2, 2, 10, 5, 0);

            // El Feneri
            flashlight = new THREE.SpotLight(0xffffff, 2, 15, Math.PI / 6, 0.5, 1);
            flashlight.position.set(0, 1.6, 0);
            flashlight.castShadow = true;
            scene.add(flashlight);
            scene.add(flashlight.target);

            // Canavar (Kırmızı bir ışık ve gölge)
            const monsterGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const monsterMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            monster = new THREE.Mesh(monsterGeo, monsterMat);
            monster.position.set(10, 0.5, 10);
            scene.add(monster);

            animate();
        }

        function createWall(w, h, x, z, depth) {
            const geo = new THREE.BoxGeometry(w, h, depth);
            const mat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, h/2, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            walls.push(wall);
        }

        // --- 2. SES SİSTEMİ (KESİN ÇALIŞAN) ---
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Kalp Atışı (Düşük Frekanslı Darbe)
            heartbeat = () => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(60, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            };
            setInterval(heartbeat, 1000); // Sürekli kalp atışı
        }

        // --- 3. MOBİL KONTROLLER ---
        const stick = document.getElementById('stick');
        document.getElementById('joy').addEventListener('touchmove', (e) => {
            const rect = joy.getBoundingClientRect();
            let x = e.touches[0].clientX - (rect.left + 60);
            let y = e.touches[0].clientY - (rect.top + 60);
            let d = Math.sqrt(x*x + y*y);
            if(d > 40) { x *= 40/d; y *= 40/d; }
            stick.style.transform = `translate(${x}px, ${y}px)`;
            moveX = x * 0.002;
            moveZ = y * 0.002;
        });

        document.getElementById('joy').addEventListener('touchend', () => {
            stick.style.transform = 'translate(0,0)';
            moveX = 0; moveZ = 0;
        });

        function jump() { if(jumpY === 0) jumpY = 0.2; }
        function toggleCrouch() {
            isCrouching = !isCrouching;
            document.getElementById('c-btn').style.background = isCrouching ? 'red' : 'rgba(255,0,0,0.1)';
        }

        // --- 4. OYUN DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            // Hareket ve Kamera
            camera.position.x += moveX;
            camera.position.z += moveZ;
            
            // Zıplama ve Eğilme Fiziği
            if(jumpY > 0) {
                camera.position.y += jumpY;
                jumpY -= 0.01;
            } else if(camera.position.y > (isCrouching ? 0.8 : 1.6)) {
                camera.position.y -= 0.05;
            } else {
                camera.position.y = (isCrouching ? 0.8 : 1.6);
                jumpY = 0;
            }

            // Feneri Kameraya Sabitle
            flashlight.position.copy(camera.position);
            const targetPos = new THREE.Vector3(0, 0, -1);
            targetPos.applyQuaternion(camera.quaternion);
            targetPos.add(camera.position);
            flashlight.target.position.copy(targetPos);

            // Canavar AI (Sessizce Takip)
            let dist = camera.position.distanceTo(monster.position);
            document.getElementById('dist').innerText = Math.floor(dist) + "m";
            
            if(dist < 15) {
                monster.position.lerp(camera.position, 0.005);
            }

            if(dist < 1) {
                alert("YAKALANDIN!");
                location.reload();
            }

            renderer.render(scene, camera);
        }

        // Başlatma Kilidi (Tarayıcı politikaları için)
        document.getElementById('overlay').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            init();
            initAudio();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
