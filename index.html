<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horror Evolution</title>
    <style>
        :root { --red-glow: rgba(255, 0, 0, 0.2); --dark: #000; }
        body, html { margin: 0; padding: 0; background: var(--dark); overflow: hidden; height: 100%; color: white; font-family: sans-serif; }

        /* OYUN SAHNESİ */
        #game-container { position: relative; width: 100vw; height: 100vh; background: var(--dark); cursor: none; }

        /* FENER EFEKTİ */
        #flashlight {
            position: absolute; inset: 0;
            background: radial-gradient(circle 150px at var(--x, 50%) var(--y, 50%), transparent 0%, rgba(0,0,0,0.95) 100%);
            z-index: 10; pointer-events: none;
        }

        /* KIRMIZI ATMOSFER IŞIĞI */
        #ambient-red {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--red-glow), transparent 70%);
            z-index: 5; pointer-events: none;
            animation: pulse 4s infinite alternate;
        }

        /* HARİTA (LABİRENT) */
        #map {
            position: absolute; width: 3000px; height: 3000px;
            background-image: 
                repeating-linear-gradient(0deg, #111 0, #111 2px, transparent 2px, transparent 100px),
                repeating-linear-gradient(90deg, #111 0, #111 2px, transparent 2px, transparent 100px);
            transition: transform 0.1s linear;
        }

        /* CANAVAR */
        #monster {
            position: absolute; width: 80px; height: 120px;
            background: radial-gradient(circle, #ff0000 0%, transparent 70%);
            filter: blur(10px); border-radius: 50%;
            z-index: 8; transition: all 0.5s linear;
        }
        #monster::after { content: '👁️'; font-size: 40px; position: absolute; top: 20px; left: 20px; opacity: 0.6; }

        /* KONTROLLER */
        #joystick { position: fixed; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 100; border: 2px solid var(--red-glow); }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: red; border-radius: 50%; opacity: 0.5; }

        @keyframes pulse { from { opacity: 0.3; } to { opacity: 0.7; } }
        #jumpscare { position: fixed; inset: 0; background: #000; z-index: 999; display: none; align-items: center; justify-content: center; font-size: 5rem; color: red; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="flashlight"></div>
        <div id="ambient-red"></div>
        <div id="map">
            <div id="monster" style="left: 1000px; top: 1000px;"></div>
        </div>
        <div id="jumpscare">ÖLDÜN</div>
    </div>

    <div id="joystick"><div id="stick"></div></div>

    <script>
        const map = document.getElementById('map');
        const monster = document.getElementById('monster');
        const flash = document.getElementById('flashlight');
        const jumpscare = document.getElementById('jumpscare');

        let player = { x: 1500, y: 1500, speed: 0 };
        let monsterPos = { x: 1000, y: 1000 };
        let audioInit = false;

        // FENERİ HAREKET ETTİR (Mobil & Masaüstü)
        window.addEventListener('mousemove', e => {
            flash.style.setProperty('--x', e.clientX + 'px');
            flash.style.setProperty('--y', e.clientY + 'px');
        });

        window.addEventListener('touchmove', e => {
            flash.style.setProperty('--x', e.touches[0].clientX + 'px');
            flash.style.setProperty('--y', e.touches[0].clientY + 'px');
        });

        // MOBİL KONTROL (JOYSTICK)
        const joy = document.getElementById('joystick');
        const stick = document.getElementById('stick');
        let moveX = 0, moveY = 0;

        joy.addEventListener('touchstart', initAudio);
        joy.addEventListener('touchmove', e => {
            let rect = joy.getBoundingClientRect();
            let x = e.touches[0].clientX - rect.left - 60;
            let y = e.touches[0].clientY - rect.top - 60;
            let dist = Math.sqrt(x*x + y*y);
            if(dist > 50) { x *= 50/dist; y *= 50/dist; }
            stick.style.transform = `translate(${x}px, ${y}px)`;
            moveX = x/10; moveY = y/10;
            player.speed = Math.abs(moveX) + Math.abs(moveY);
        });
        joy.addEventListener('touchend', () => {
            stick.style.transform = 'translate(0,0)';
            moveX = 0; moveY = 0; player.speed = 0;
        });

        // OYUN DÖNGÜSÜ
        function gameLoop() {
            player.x += moveX;
            player.y += moveY;
            map.style.transform = `translate(${-player.x + window.innerWidth/2}px, ${-player.y + window.innerHeight/2}px)`;

            // CANAVAR ZEKSASI (Sese doğru gelme)
            // Eğer oyuncu hareket ediyorsa canavar oyuncunun yerine doğru ilerler
            if (player.speed > 0.5) {
                let dx = player.x - monsterPos.x;
                let dy = player.y - monsterPos.y;
                monsterPos.x += dx * 0.02; // Canavar hızı
                monsterPos.y += dy * 0.02;
            } else {
                // Oyuncu duruyorsa canavar rastgele gezinir
                monsterPos.x += Math.sin(Date.now()/1000) * 2;
                monsterPos.y += Math.cos(Date.now()/1000) * 2;
            }

            monster.style.left = monsterPos.x + 'px';
            monster.style.top = monsterPos.y + 'px';

            // ÇARPIŞMA (Ölüm)
            let distToMonster = Math.sqrt(Math.pow(player.x - monsterPos.x, 2) + Math.pow(player.y - monsterPos.y, 2));
            if (distToMonster < 100) {
                jumpscare.style.display = 'flex';
                playHorrorSound(800);
                setTimeout(() => location.reload(), 2000);
            }

            requestAnimationFrame(gameLoop);
        }

        // SES MOTORU
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function initAudio() { if(!audioInit) { audioCtx.resume(); audioInit = true; } }

        function playHorrorSound(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        gameLoop();
    </script>
</body>
</html>
