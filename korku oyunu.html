<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horror Night: Escape</title>
    <style>
        :root { --bg: #000; --wall: #111; --floor: #0a0a0a; --jumpscare: #ff0000; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; user-select: none; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }

        /* --- OYUN ALANI (3D PERSPEKTİF) --- */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; perspective: 1000px;
        }

        /* EL FENERİ EFEKTİ (VIGNETTE) */
        #flashlight {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 10%, rgba(0,0,0,0.98) 40%);
            z-index: 100; pointer-events: none;
        }

        /* LABİRENT GÖRÜNÜMÜ (TEMSİLİ 3D) */
        #maze {
            width: 200%; height: 200%;
            background: 
                linear-gradient(90deg, var(--wall) 2px, transparent 2px) 0 0 / 100px 100px,
                linear-gradient(var(--wall) 2px, transparent 2px) 0 0 / 100px 100px,
                var(--floor);
            transform: rotateX(60deg) translateY(-50%) translateZ(-100px);
            transition: transform 0.1s linear;
            z-index: 10;
        }

        /* YARATIK (TEHLİKE) */
        #monster {
            position: absolute; width: 60px; height: 100px;
            background: url('https://i.imgur.com/uG9nQ2P.png') center/contain no-repeat; /* Temsili korkunç silüet */
            display: none; z-index: 50; transition: 0.1s;
        }

        /* JUMPSCARE EKRANI */
        #jumpscare-overlay {
            position: fixed; inset: 0;
            background: var(--jumpscare) url('https://i.imgur.com/W29F1C7.jpg') center/cover no-repeat; /* Temsili jumpscare yüzü */
            z-index: 1000; display: none;
            animation: shake 0.1s infinite;
        }

        /* --- MOBİL KONTROLLER --- */
        .joystick-zone { position: fixed; bottom: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; z-index: 200; border: 1px solid rgba(255,255,255,0.1); }
        #joy-move { left: 30px; } /* Sol: Yürüme */
        #joy-look { right: 30px; } /* Sağ: Bakma */
        .joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 50%; }

        /* HUD */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 300; font-weight: bold; text-shadow: 0 0 5px red; }

        /* ANİMASYONLAR VE SES */
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
        @keyframes heartbeating { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flashlight"></div>
        <div id="maze">
            <div id="monster"></div>
        </div>
        <div id="jumpscare-overlay"></div>
    </div>

    <div id="hud">👀 KAÇ: <span id="timer">60</span>s</div>

    <div id="joy-move" class="joystick-zone"><div class="joystick-stick"></div></div>
    <div id="joy-look" class="joystick-zone"><div class="joystick-stick"></div></div>

    <script>
        // --- OYUN DEĞİŞKENLERİ ---
        const state = {
            posX: 0, posY: 0, angle: 0,
            timer: 60, isGameOver: false,
            monsterActive: false
        };

        const maze = document.getElementById('maze');
        const monster = document.getElementById('monster');
        const jumpscare = document.getElementById('jumpscare-overlay');
        const timerEl = document.getElementById('timer');

        // --- SES SİMÜLASYONU (Web Audio API - Opsiyonel, genelde mobilde izin gerekir) ---
        // Knk normalde buraya .mp3 dosyası koyarız ama kod içinde bip sesi yapabiliriz.
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playScream() {
            if(state.isGameOver) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.rampToValueAtTime(1000, audioCtx.currentTime + 0.5);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.rampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // --- MOBİL DOKUNMATİK KONTROLLER (JOYSTICK MANTIĞI) ---
        function setupJoystick(id, callback) {
            const zone = document.getElementById(id);
            const stick = zone.querySelector('.joystick-stick');
            let startX, startY;

            zone.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            });

            zone.addEventListener('touchmove', e => {
                if (state.isGameOver) return;
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const maxDist = 35;

                const moveX = dx > maxDist ? maxDist : (dx < -maxDist ? -maxDist : dx);
                const moveY = dy > maxDist ? maxDist : (dy < -maxDist ? -maxDist : dy);

                stick.style.transform = `translate(${moveX}px, ${moveY}px)`;
                callback(moveX / maxDist, moveY / maxDist);
            });

            zone.addEventListener('touchend', () => {
                stick.style.transform = `translate(0px, 0px)`;
                callback(0, 0);
            });
        }

        // Hareket Mantığı (Sol Joystick)
        setupJoystick('joy-move', (nx, ny) => {
            if(state.isGameOver) return;
            // Basit yürüme simülasyonu
            state.posX -= nx * 5;
            state.posY -= ny * 5;
            updateMaze();
        });

        // Bakış Mantığı (Sağ Joystick)
        setupJoystick('joy-look', (nx, ny) => {
            if(state.isGameOver) return;
            state.angle += nx * 2;
            updateMaze();
        });

        function updateMaze() {
            // 3D görünümlü labirenti hareket ettir ve döndür
            maze.style.transform = `rotateX(60deg) rotateZ(${state.angle}deg) translate(${state.posX}px, ${state.posY}px) translateZ(-100px)`;
        }

        // --- KORKU MEKANİKLERİ ---
        // Yaratık Döngüsü (Her 5-10 saniyede bir görünür)
        function monsterLoop() {
            if(state.isGameOver) return;
            const spawnTime = Math.random() * 5000 + 5000;
            
            setTimeout(() => {
                if(state.isGameOver) return;
                spawnMonster();
                // Yaratık 2 saniye sonra kaybolur
                setTimeout(hideMonster, 2000);
                monsterLoop();
            }, spawnTime);
        }

        function spawnMonster() {
            state.monsterActive = true;
            // Yaratığı el fenerinin görüş alanına yakın bir yere koy
            monster.style.display = 'block';
            monster.style.left = (Math.random() * 40 + 30) + '%';
            monster.style.top = (Math.random() * 40 + 30) + '%';
            
            // Eğer oyuncu yaratığa çok yakınsa (veya bakıyorsa) jumpscare tetikle
            // Bu prototipte rastgele tetikleyelim.
            if(Math.random() > 0.5) triggerJumpscare();
        }

        function hideMonster() {
            monster.style.display = 'none';
            state.monsterActive = false;
        }

        function triggerJumpscare() {
            if(state.isGameOver) return;
            state.isGameOver = true;
            
            // Jumpscare ekranını aç, çığlığı çal
            jumpscare.style.display = 'block';
            try { playScream(); } catch(e) {} // Ses mobilde bazen engellenir

            // 2 saniye sonra oyunu sıfırla
            setTimeout(() => {
                jumpscare.style.display = 'none';
                resetGame();
            }, 2000);
        }

        // --- OYUN DÖNGÜSÜ (TİMER) ---
        function resetGame() {
            state.money = 100000000; state.fans = 0; state.offLv = 1; // Tycoon verileri (silmedim)
            state.posX = 0; state.posY = 0; state.angle = 0; state.timer = 60;
            state.isGameOver = false; hideMonster();
            updateMaze();
            document.getElementById('joy-move').querySelector('.joystick-stick').style.transform = 'translate(0,0)';
            document.getElementById('joy-look').querySelector('.joystick-stick').style.transform = 'translate(0,0)';
        }

        setInterval(() => {
            if(state.isGameOver) return;
            state.timer--;
            timerEl.innerText = state.timer;
            if(state.timer <= 0) { alert("KAÇTIN!"); resetGame(); }
        }, 1000);

        // Oyunu Başlat
        updateMaze();
        monsterLoop();
        // Mobilde ses için ekrana dokunma şartı
        window.addEventListener('touchstart', () => { if(audioCtx.state === 'suspended') audioCtx.resume(); }, {once: true});
    </script>
</body>
</html>
